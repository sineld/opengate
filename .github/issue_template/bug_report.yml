name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: macos
    attributes:
      label: macOS Version
      options:
        - macOS 26+ higher
        - macOS 26 Tahoe
        - macOS 15 Sequoia
        - macOS 14 Sonoma
        - macOS 13 Ventura
        - macOS 12 Monterey

    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Chip Architecture
      options:
        - Apple Silicon
        - Intel Core
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OpenGate Version
      placeholder: e.g. v1.0.3
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Click on...
        3. See error
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional info (screenshots, logs)
      placeholder: Paste any relevant logs or attach screenshots here
    validations:
      required: false
